name: Deploy to Cloud Run

# Manual trigger. Backend runtime secrets are configured once on the Cloud Run
# service (see docs/DEPLOYMENT.md) and preserved across image-only deploys, so
# this workflow only needs GCP credentials + the public frontend build args.
#
# Required repository secrets:
#   GCP_SA_KEY                     — service-account JSON key
#   GCP_PROJECT_ID, GCP_REGION     — target project + region (e.g. europe-west1)
#   GAR_REPO                       — Artifact Registry repository name
#   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY, NEXT_PUBLIC_API_URL
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      REGION: ${{ secrets.GCP_REGION }}
      PROJECT: ${{ secrets.GCP_PROJECT_ID }}
      REPO: ${{ secrets.GAR_REPO }}
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "$REGION-docker.pkg.dev" --quiet

      - name: Build & push backend
        run: |
          IMAGE="$REGION-docker.pkg.dev/$PROJECT/$REPO/backend:${{ github.sha }}"
          docker build -f backend/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "BACKEND_IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy backend (env/secrets preserved on the service)
        run: |
          gcloud run deploy signalscout-api \
            --image "$BACKEND_IMAGE" --region "$REGION" --platform managed \
            --allow-unauthenticated --port 8080

      - name: Build & push frontend
        run: |
          IMAGE="$REGION-docker.pkg.dev/$PROJECT/$REPO/frontend:${{ github.sha }}"
          docker build -f frontend/Dockerfile \
            --build-arg NEXT_PUBLIC_SUPABASE_URL='${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}' \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY='${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}' \
            --build-arg NEXT_PUBLIC_API_URL='${{ secrets.NEXT_PUBLIC_API_URL }}' \
            -t "$IMAGE" .
          docker push "$IMAGE"
          echo "FRONTEND_IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy frontend
        run: |
          gcloud run deploy signalscout-web \
            --image "$FRONTEND_IMAGE" --region "$REGION" --platform managed \
            --allow-unauthenticated --port 3000
